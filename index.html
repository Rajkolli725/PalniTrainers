<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meet Our Trainers</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1f2933;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #1d4ed8;
    --accent-soft: #eef2ff;
    --star: #f59e0b;
    --hover: #fafafa;
    --input: #ffffff;
    --ghost-bg: #ece9e2;
    --ghost-hover: #e0ddd4;
    --primary-bg: #1f2933;
    --primary-hover: #000000;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  }
  body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --ink: #e2e8f0;
    --muted: #94a3b8;
    --line: #334155;
    --accent: #60a5fa;
    --accent-soft: #1e3a5f;
    --star: #fbbf24;
    --hover: #243044;
    --input: #0f172a;
    --ghost-bg: #334155;
    --ghost-hover: #3f4d63;
    --primary-bg: #2563eb;
    --primary-hover: #1d4ed8;
    --shadow: 0 1px 3px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 80px; }

  header.page {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    justify-content: space-between; margin-bottom: 24px;
  }
  header.page h1 { font-size: 1.6rem; margin: 0; }
  header.page .sub { color: var(--muted); font-size: .9rem; margin-top: 2px; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 20px;
  }
  .search {
    flex: 1 1 260px; position: relative;
  }
  .search input {
    width: 100%; padding: 12px 14px 12px 40px; border: 1px solid var(--line);
    border-radius: 12px; font-size: .95rem; background: var(--input); color: var(--ink); outline: none;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .count-pill {
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
    padding: 8px 14px; border-radius: 999px; font-size: .85rem; white-space: nowrap;
  }
  .sort-select {
    padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--input); font-size: .9rem; color: var(--ink);
  }
  button.btn {
    border: none; cursor: pointer; font-size: .92rem; font-weight: 600;
    padding: 12px 18px; border-radius: 12px; transition: .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary-bg); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-ghost { background: var(--ghost-bg); color: var(--ink); }
  .btn-ghost:hover { background: var(--ghost-hover); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { filter: brightness(.92); }

  /* Header theme toggle */
  .head-actions { display: flex; align-items: center; gap: 10px; }
  .icon-toggle {
    width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; font-size: 1.05rem; display: grid; place-items: center;
    transition: .15s;
  }
  .icon-toggle:hover { background: var(--hover); }

  /* Accordion list */
  .list { display: flex; flex-direction: column; gap: 14px; }
  .acc {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; transition: border-color .15s;
  }
  .acc.open { border-color: var(--accent); }

  .acc-head {
    display: flex; align-items: center; gap: 16px; padding: 14px 16px; cursor: pointer;
    position: relative;
  }
  .acc-head:hover { background: var(--hover); }
  .avatar {
    width: 64px; height: 64px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, #dbeafe, #e0e7ff); overflow: hidden;
    position: relative; cursor: pointer;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar .avatar-initials {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--accent); font-size: 1.2rem; line-height: 1;
  }
  .avatar .avatar-edit {
    position: absolute; inset: 0; display: grid; place-items: center; font-size: 1.1rem;
    background: rgba(0,0,0,.45); color: #fff; opacity: 0; transition: opacity .15s; border-radius: 14px;
  }
  .avatar:hover .avatar-edit { opacity: 1; }
  .head-meta { flex: 1; min-width: 0; }
  .head-meta .name { font-size: 1.12rem; font-weight: 800; color: var(--accent); }
  .head-meta .role { color: var(--ink); font-size: .92rem; }
  .head-meta .company {
    display: inline-block; margin-top: 3px; color: var(--muted); font-size: .72rem;
    font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    background: var(--accent-soft); padding: 2px 8px; border-radius: 6px;
  }
  .chevron { flex-shrink: 0; color: var(--muted); transition: transform .2s; }
  .acc.open .chevron { transform: rotate(180deg); }

  /* Body */
  .acc-body { display: none; padding: 4px 16px 20px; border-top: 1px solid var(--line); }
  .acc.open .acc-body { display: block; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; }
  .col h4 {
    margin: 0 0 8px; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted);
  }
  .field { margin-bottom: 16px; }
  .bio { font-size: .94rem; text-align: justify; }
  .rating-row { display: flex; align-items: center; gap: 8px; font-size: .94rem; }
  .rating-big { font-size: .94rem; font-weight: 800; color: var(--ink); }
  .stars { color: var(--star); letter-spacing: 2px; font-size: .94rem; }
  .stat { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: .92rem; }
  .stat .v { font-weight: 700; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 10px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
  .chip.cert { background: rgba(16,185,129,.15); color: #10b981; }
  a.link { color: var(--accent); text-decoration: none; font-weight: 600; word-break: break-all; }
  a.link:hover { text-decoration: underline; }

  .cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: auto; padding-top: 18px; align-items: center; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--input); display: grid; place-items: center; cursor: pointer; color: var(--ink);
    text-decoration: none; transition: .15s;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .icon-btn.linkedin:hover { color: #0a66c2; border-color: #0a66c2; }
  .icon-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
  .icon-btn svg { width: 20px; height: 20px; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  .hint { font-size: .78rem; color: var(--muted); margin-top: 4px; }

  /* Rating stays plain text; only "(Reviews)" is a hyperlink */
  .reviews-link { color: var(--accent); text-decoration: underline; font-weight: 600; font-size: .85rem; cursor: pointer; margin-left: 2px; }
  .reviews-link:hover { color: var(--accent); opacity: .8; }

  /* ===== Reviews & Feedback view ===== */
  .reviews-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .back-link { color: var(--accent); text-decoration: none; font-weight: 700; font-size: .95rem; display: inline-flex; align-items: center; gap: 6px; }
  .back-link:hover { text-decoration: underline; }
  .reviews-title { font-size: 1.5rem; margin: 8px 0 2px; }
  .reviews-sub { color: var(--muted); font-size: .9rem; margin-bottom: 18px; }
  .reviews-overall { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; color: var(--ink); margin-left: 6px; font-size: .95rem; }

  .reviews-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* Submit Review modal */
  .rv-modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none;
    align-items: flex-start; justify-content: center; padding: 24px; z-index: 60; overflow-y: auto;
  }
  .rv-modal {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px; width: 100%;
    max-width: 620px; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,.35); margin: auto;
  }
  .rv-modal h3 { margin: 0 0 16px; font-size: 1.2rem; }
  .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
  .rv-modal label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
  .rv-modal input[type=text], .rv-modal textarea, .rv-modal select {
    width: 100%; padding: 10px 11px; border: 1px solid var(--line); border-radius: 10px;
    font-size: .9rem; font-family: inherit; outline: none; background: var(--input); color: var(--ink);
  }
  .rv-modal textarea { min-height: 96px; resize: vertical; }
  .rv-modal input:focus, .rv-modal textarea:focus, .rv-modal select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .rv-modal-actions { display: flex; gap: 12px; margin-top: 22px; }
  .rv-modal-actions .btn { flex: 1; padding: 13px; }
  .param-input { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; margin-bottom: 8px; }
  .param-input span.lbl { font-size: .82rem; }
  .param-input input[type=range] { width: 140px; accent-color: var(--accent); }
  .param-input .num { font-weight: 700; min-width: 28px; text-align: right; font-size: .85rem; }

  .review-cards { display: flex; flex-direction: column; gap: 16px; }
  .review-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .review-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .rv-name { font-weight: 800; color: var(--accent); font-size: 1.05rem; }
  .rv-for { color: var(--muted); font-size: .85rem; }
  .rv-rating { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; }
  .rv-rating .stars { font-size: .95rem; }
  .rv-batch { margin-left: auto; font-size: .72rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); background: var(--accent-soft); padding: 3px 10px; border-radius: 6px; }
  .review-body { display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; padding: 18px 20px; }
  .scale-row { margin-bottom: 12px; }
  .scale-top { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 5px; }
  .scale-top .sv { font-weight: 700; color: var(--ink); }
  .scale-bar { height: 7px; border-radius: 999px; background: var(--accent-soft); overflow: hidden; }
  .scale-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), #22c55e); }
  .rv-comment { font-size: .94rem; text-align: justify; }
  .rv-comment h4 { margin: 0 0 8px; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .rv-comment .quote { color: var(--ink); }

  /* Responsive */
  @media (max-width: 640px) {
    .cols { grid-template-columns: 1fr; gap: 16px; }
    .avatar { width: 52px; height: 52px; }
    .head-meta .name { font-size: 1rem; }
    header.page h1 { font-size: 1.3rem; }
    .acc-head { gap: 10px; }
    .review-body { grid-template-columns: 1fr; gap: 16px; }
    .add-grid { grid-template-columns: 1fr; }
    .rv-batch { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- ===== Trainers view ===== -->
  <div id="mainView">
    <header class="page">
      <h1>Meet Our Trainers</h1>
      <div class="head-actions">
        <button class="icon-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle day / night theme">🌙</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search by name, role, company, or skill…" oninput="render()" />
      </div>
      <select id="sort" class="sort-select" onchange="render()">
        <option value="rating">Sort: Rating (high → low)</option>
        <option value="name">Sort: Name (A → Z)</option>
        <option value="experience">Sort: Experience</option>
      </select>
      <span class="count-pill" id="count">0 members</span>
    </div>

    <div class="list" id="list"></div>
  </div>

  <!-- ===== Reviews & Feedback view (populated by showAllReviews) ===== -->
  <div id="reviewsView" style="display:none"></div>
</div>

<!-- Submit Review modal (populated by openReviewModal) -->
<div id="rvModal" class="rv-modal-overlay" style="display:none" onclick="if(event.target===this)closeReviewModal()"></div>

<script>
/* ---- 40 dummy team members (deterministic, varied so ratings differ) ---- */
function buildSeed(){
  const first = ['Alex','Priya','Marcus','Sara','James','Lena','Omar','Nina','David','Aisha',
    'Tom','Mei','Carlos','Ruth','Ivan','Grace','Hassan','Emma','Noah','Zara',
    'Leo','Maya','Sam','Tara','Kyle','Anya','Raj','Lucy','Ben','Chloe',
    'Victor','Hana','Felix','Iris','Dane','Nora','Eli','Yara','Paul','Mira'];
  const last = ['Rivera','Nair','Lee','Khan','Brooks','Vogel','Haddad','Patel','Stone','Bello',
    'Chen','Lin','Ortiz','Hayes','Petrov','Owens','Ali','Watts','Park','Reed',
    'Fox','Singh','Cole','Diaz','Burns','Volkov','Mehta','Hart','Frost','Wells',
    'Marsh','Sato','Berg','Quinn','Lowe','Reyes','Webb','Aziz','Dunn','Kerr'];
  const roles = ['Engineering Manager','Principal Data Scientist','UX Designer','Solutions Architect',
    'Product Manager','DevOps Lead','Frontend Engineer','Backend Engineer','QA Lead','Scrum Master',
    'Business Analyst','Security Engineer','ML Engineer','Cloud Architect','Tech Lead'];
  const companies = ['Acme Corp','DataWorks','Bright Studio','NorthBay','Vertex Labs','Cloudpeak',
    'BlueRiver','Helix','Quantum IO','Summit Tech'];
  const skillsPool = ['Python','Go','Java','SQL','AWS','Azure','Kubernetes','React','Leadership',
    'Mentoring','ML','TensorFlow','Figma','Docker','Terraform','Node.js','Statistics','Agile',
    'Security','Communication','Data Viz','GraphQL'];
  const certsPool = ['CSA','CAD','CIS-ITSM','PMP','AWS-SA','CKA','CISSP','Scrum-PSM','Azure-AZ900','TOGAF'];
  const bios = [
    'Leads backend infrastructure and mentors junior devs. Passionate about scalable systems.',
    'Builds production ML pipelines and trains analytics teams across the org.',
    'Human-centered designer focused on accessible, delightful product experiences.',
    'Drives platform reliability and champions a strong engineering culture.',
    'Connects business goals to technical delivery with a pragmatic, data-driven style.',
    'Hands-on technologist who loves automating the boring parts and shipping fast.',
    'Coaches teams toward continuous improvement and sustainable delivery.',
    'Specializes in secure-by-default architectures and threat modeling.'
  ];
  const out = [];
  for (let i = 0; i < 40; i++) {
    const name = first[i] + ' ' + last[i];
    const nSkills = 2 + (i % 6);          // 2..7 skills
    const nCerts = i % 5;                  // 0..4 certs
    const skills = []; for (let s=0;s<nSkills;s++) skills.push(skillsPool[(i*3+s)%skillsPool.length]);
    const certs  = []; for (let c=0;c<nCerts;c++)  certs.push(certsPool[(i*2+c)%certsPool.length]);
    const company = companies[i % companies.length];
    out.push({
      name,
      role: roles[i % roles.length],
      company,
      exp: 2 + (i % 18),                                   // 2..19 yrs
      skills: [...new Set(skills)],
      certs: [...new Set(certs)],
      trainings: (i * 17) % 460,                            // 0..459
      impl: (i * 7) % 45,                                   // 0..44
      linkedin: '',
      email: (first[i] + '.' + last[i]).toLowerCase() + '@' + company.toLowerCase().replace(/[^a-z]/g,'') + '.com',
      resume: '',
      bio: bios[i % bios.length]
    });
  }
  return out;
}
const seed = buildSeed();
let _idCounter = 0;
function withId(m){ if(!m.id) m.id = 'm_' + Date.now().toString(36) + '_' + (_idCounter++); return m; }

/* ============================================================
   ServiceNow integration — reads from an ANONYMOUS Scripted REST API.
   NO credentials are embedded in this page. The API returns only the
   safe, read-only fields (see the server script). This public page is a
   read-only viewer; member management is done in ServiceNow directly.
   ============================================================ */
const SN = { instance: 'https://ven07539.service-now.com' };
const API_URL    = SN.instance + '/api/x_palni_servicen_1/team_profiles';  // GET -> list of members
const RESUME_URL = API_URL + '/resume/';                                    // GET /resume/{sysId} -> base64

// No auth header — the Scripted REST API is anonymous; credentials:'omit'
// keeps it a clean cross-origin request governed only by the CORS rule.
function snFetch(url, opts){
  opts = opts || {};
  return fetch(url, Object.assign({}, opts, {
    credentials: 'omit',
    headers: Object.assign({ 'Accept': 'application/json' }, opts.headers || {})
  }));
}

// Scripted-REST profile -> app member object
function mapRecord(p){
  return {
    id: p.sys_id,
    sysId: p.sys_id,
    name: p.name || '',
    role: p.role || '',
    company: p.company || '',
    exp: +p.experience || 0,
    skills: splitList(String(p.skills || '')),
    certs: splitList(String(p.certifications || '')),
    trainings: +p.trainings || 0,
    impl: +p.implementations || 0,
    linkedin: '',                  // no LinkedIn column in the table
    email: p.email || '',
    bio: p.bio || '',
    avatar: p.photo || '',         // data URI returned by the API (or '' -> initials)
    resumeId: p.resume_id || '',
    resumeName: p.resume_name || ''
  };
}

let members = [];

async function loadMembers(){
  renderStatus('Loading team profiles from ServiceNow…');
  try {
    const res = await snFetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + (await res.text()).slice(0,300));
    const json = await res.json();
    members = (json.result || []).map(mapRecord);
    route();
  } catch (e) {
    renderError(e.message);
  }
}

// Resume is returned by the Scripted REST API as base64; turn it into a download.
async function downloadResume(id){
  const m = members.find(x => x.id === id);
  if (!m || !m.resumeId) { alert('No resume available for this member.'); return; }
  try {
    const res = await snFetch(RESUME_URL + encodeURIComponent(m.sysId));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const j = (await res.json()).result || {};
    if (!j.data) throw new Error('empty response');
    const bin = atob(j.data);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], { type: j.content_type || 'application/octet-stream' }));
    const link = document.createElement('a');
    link.href = url; link.download = j.file_name || m.resumeName || 'resume';
    document.body.appendChild(link); link.click(); link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch (e) { alert('Could not download resume: ' + e.message); }
}

function useDemoData(){ members = seed.map(m => withId({...m})); render(); }

function renderStatus(msg){
  document.getElementById('list').innerHTML = '<div class="empty">' + esc(msg) + '</div>';
}
function renderError(msg){
  document.getElementById('list').innerHTML =
    '<div class="empty">' +
      '<p style="color:#dc2626;font-weight:700;font-size:1.05rem">Could not load from ServiceNow</p>' +
      '<p class="hint" style="max-width:540px;margin:8px auto">' + esc(msg) + '</p>' +
      '<p class="hint" style="max-width:540px;margin:8px auto">Check that the Scripted REST API resource has its script pasted in, and that a CORS rule for the <b>Team Profiles</b> API allows this page\'s domain (GET).</p>' +
      '<div style="margin-top:14px;display:flex;gap:10px;justify-content:center">' +
        '<button class="btn btn-primary" onclick="loadMembers()">Retry</button>' +
        '<button class="btn btn-ghost" onclick="useDemoData()">Use demo data</button>' +
      '</div>' +
    '</div>';
}
/* ---- Rating engine ----
   Weighted score normalized to 0–5 from five dimensions. */
function computeRating(m){
  const exp = Math.min((+m.exp||0)/8, 1);            // 8+ yrs => max
  const certs = Math.min((m.certs?.length||0)/3, 1); // 3+ certs => max
  const trn = Math.min((+m.trainings||0)/20, 1);     // 20+ => max
  const impl = Math.min((+m.impl||0)/10, 1);          // 10+ => max
  const skl = Math.min((m.skills?.length||0)/10, 1); // 10+ skills => max
  const score = exp*0.30 + certs*0.20 + trn*0.20 + impl*0.20 + skl*0.10;
  return Math.round(score * 5 * 10) / 10;            // one decimal, 0–5
}
function stars(r){
  const full = Math.round(r);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}
function initials(name){ return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sortBy = document.getElementById('sort').value;
  let rows = members.map(m => ({...m, _rating: computeRating(m)}));

  if (q) {
    rows = rows.filter(m => {
      const hay = [m.name, m.role, m.company, m.bio, (m.skills||[]).join(' '), (m.certs||[]).join(' ')]
        .join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  rows.sort((a,b)=>{
    if (sortBy==='name') return a.name.localeCompare(b.name);
    if (sortBy==='experience') return (+b.exp||0)-(+a.exp||0);
    return b._rating - a._rating;
  });

  document.getElementById('count').textContent = members.length + ' member' + (members.length!==1?'s':'');
  const list = document.getElementById('list');

  if (!rows.length) {
    list.innerHTML = '<div class="empty">No matching team members.</div>';
    return;
  }

  list.innerHTML = rows.map(m => {
    const profileUrl = location.href.split('#')[0] + '#profile=' + encodeURIComponent(m.id);
    const linkedin = m.linkedin || ('https://www.linkedin.com/search/results/all/?keywords=' + encodeURIComponent(m.name));
    const avatar = m.avatar
      ? `<img src="${m.avatar}" alt="${esc(m.name)}">`
      : `<span class="avatar-initials">${initials(m.name)}</span>`;
    const skillChips = (m.skills||[]).map(s=>`<span class="chip">${esc(s)}</span>`).join('') || '<span class="hint">—</span>';
    const certChips = (m.certs||[]).map(s=>`<span class="chip cert">${esc(s)}</span>`).join('') || '<span class="hint">—</span>';
    const hasResume = !!m.resumeId;

    return `
    <div class="acc" id="acc-${m.id}">
      <div class="acc-head" onclick="toggle('${m.id}')">
        <div class="avatar">${avatar}</div>
        <div class="head-meta">
          <div class="name">${esc(m.name)}</div>
          <div class="role">${esc(m.role)}</div>
          ${m.company ? `<span class="company">${esc(m.company)}</span>` : ''}
        </div>
        <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="acc-body">
        <div class="cols">
          <div class="col">
            <div class="field">
              <div class="bio">${esc(m.bio) || '<span class="hint">No bio provided.</span>'}</div>
            </div>
            <div class="field">
              <div class="rating-row">
                <span class="rating-big">${m._rating.toFixed(1)}/5</span>
                <span class="stars">${stars(m._rating)}</span>
                <a class="reviews-link" href="#reviews">(Reviews)</a>
              </div>
            </div>
            <div class="cta-row">
              <a class="icon-btn linkedin" href="${esc(linkedin)}" target="_blank" rel="noopener" title="Connect on LinkedIn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V23h-4V8zm7.5 0h3.8v2.05h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V23h-4v-6.6c0-1.57-.03-3.6-2.2-3.6-2.2 0-2.53 1.72-2.53 3.49V23h-4V8z"/></svg>
              </a>
              <a class="icon-btn" href="mailto:support@palni.com?subject=${encodeURIComponent('Inquiry about ' + m.name)}" title="Contact (support@palni.com)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
              </a>
              <button class="icon-btn ${hasResume ? '' : 'disabled'}" onclick="downloadResume('${m.id}')" title="${hasResume ? 'Download resume' + (m.resumeName ? ' (' + esc(m.resumeName) + ')' : '') : 'No resume available'}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
              </button>
            </div>
          </div>
          <div class="col">
            <div class="field">
              <div class="stat"><span>💼 Experience</span><span class="v">${esc(String(m.exp||0))} yrs</span></div>
              <div class="stat"><span>📊 Trainings Delivered</span><span class="v">${esc(String(m.trainings||0))}</span></div>
              <div class="stat"><span>🚀 Successful Implementations</span><span class="v">${esc(String(m.impl||0))}</span></div>
            </div>
            <div class="field">
              <h4>🎖 Certifications (${(m.certs||[]).length})</h4>
              <div class="chips">${certChips}</div>
            </div>
            <div class="field">
              <h4>🛠 Skills</h4>
              <div class="chips">${skillChips}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // keep open state if hash points at a profile
  const hash = decodeURIComponent((location.hash.match(/profile=([^&]+)/)||[])[1]||'');
  if (hash) toggle(hash, true);
}

function toggle(id, forceOpen){
  const el = document.getElementById('acc-'+id);
  if (!el) return;
  const willOpen = forceOpen ? true : !el.classList.contains('open');
  // Collapse any other open profile — only one stays open at a time
  document.querySelectorAll('.acc.open').forEach(a => a.classList.remove('open'));
  if (willOpen) el.classList.add('open');
}

function splitList(v){ return v.split(',').map(s=>s.trim()).filter(Boolean); }

/* ============================================================
   Reviews & Feedback (one global page for ALL trainers)
   ------------------------------------------------------------
   Demo data: a few seeded sample reviews (tied to real trainers)
   plus any reviews submitted via the form, saved in localStorage.
   ============================================================ */
const REVIEW_PARAMS = [
  ['depth',      'Depth of Knowledge Covered'],
  ['clarity',    'Clarity of Explanation'],
  ['interaction','Interaction with Participants'],
  ['handsOn',    'Hands-on Exercises'],
  ['realWorld',  'Real-world Examples'],
  ['planning',   'Session Planning and Flow'],
  ['mentorship', 'Mentorship and Guidance'],
  ['recommend',  'Likelihood to Recommend This Program']
];
const REVIEWS_KEY = 'teamProfiles.reviews.v2';   // flat array of submitted reviews
let userReviews = [];
try { userReviews = JSON.parse(localStorage.getItem(REVIEWS_KEY)) || []; if (!Array.isArray(userReviews)) userReviews = []; } catch(e) { userReviews = []; }
let reviewSort = 'overall';

function saveReviews(){ localStorage.setItem(REVIEWS_KEY, JSON.stringify(userReviews)); }
function avgScore(scores){
  const vals = REVIEW_PARAMS.map(p => +scores[p[0]] || 0);
  return Math.round((vals.reduce((a,b)=>a+b,0) / vals.length) * 10) / 10;
}
function backToTrainers(e){ if (e) e.preventDefault(); location.hash = ''; }
function setReviewSort(v){ reviewSort = v; showAllReviews(); }
function sortValue(r){ return reviewSort === 'overall' ? avgScore(r.scores) : (+r.scores[reviewSort] || 0); }

// Seeded sample reviews tied to the first few real trainers, so the page isn't empty.
function buildSampleReviews(){
  const base = [
    { name:'Anita Rao',   batch:'B-2025-02', base:4.6, comment:'Exceptional sessions — concepts were broken down clearly and the hands-on labs made everything click. Easily one of the best trainers I have worked with.' },
    { name:'John Mathew', batch:'B-2024-11', base:4.2, comment:'Very knowledgeable and approachable. Real-world examples were spot on. Would have liked a little more time on the advanced topics, but overall excellent.' },
    { name:'Sara Lee',    batch:'B-2025-01', base:4.8, comment:'Engaging from start to finish. The mentorship after the program was invaluable and directly helped me on a live project. Highly recommend.' },
    { name:'Vikram Shah', batch:'B-2024-09', base:3.9, comment:'Solid program with practical content. The pacing was good and questions were always welcomed. A bit more real-world context would make it perfect.' },
    { name:'Priya Menon', batch:'B-2025-03', base:4.4, comment:'Great clarity and structure. I appreciated the hands-on exercises and the follow-up guidance. Would definitely recommend to colleagues.' }
  ];
  const out = [];
  members.slice(0, base.length).forEach(function(trainer, i){
    const s = base[i];
    const scores = {};
    REVIEW_PARAMS.forEach(function(p, j){
      const v = s.base + (((i + j) % 3) - 1) * 0.3;
      scores[p[0]] = Math.max(3, Math.min(5, Math.round(v * 2) / 2));
    });
    out.push({ id:'sample-'+i, trainerId:trainer.id, trainerName:trainer.name, name:s.name, batch:s.batch, comment:s.comment, scores:scores });
  });
  return out;
}
function allReviews(){ return buildSampleReviews().concat(userReviews); }

function scaleRow(label, val){
  const pct = Math.max(0, Math.min(100, (val/5)*100));
  return '<div class="scale-row">' +
           '<div class="scale-top"><span>' + esc(label) + '</span><span class="sv">' + val.toFixed(1) + '/5</span></div>' +
           '<div class="scale-bar"><div class="scale-fill" style="width:' + pct + '%"></div></div>' +
         '</div>';
}

function reviewCard(r){
  const overall = avgScore(r.scores);
  const scales = REVIEW_PARAMS.map(function(p){ return scaleRow(p[1], +r.scores[p[0]] || 0); }).join('');
  return '<div class="review-card">' +
    '<div class="review-head">' +
      '<span class="rv-name">' + esc(r.name) + '</span>' +
      (r.trainerName ? '<span class="rv-for">on ' + esc(r.trainerName) + '</span>' : '') +
      '<span class="rv-rating">' + overall.toFixed(1) + '/5 <span class="stars">' + stars(overall) + '</span></span>' +
      '<span class="rv-batch">Batch: ' + esc(r.batch || '—') + '</span>' +
    '</div>' +
    '<div class="review-body">' +
      '<div class="rv-scales">' + scales + '</div>' +
      '<div class="rv-comment"><h4>Comment</h4><div class="quote">' + esc(r.comment) + '</div></div>' +
    '</div>' +
  '</div>';
}

function showAllReviews(){
  const list = allReviews().slice().sort(function(a,b){ return sortValue(b) - sortValue(a); });
  const overall = list.length
    ? Math.round((list.reduce(function(a,r){ return a + avgScore(r.scores); }, 0) / list.length) * 10) / 10
    : 0;
  const sortOpts = [['overall','Overall']].concat(REVIEW_PARAMS).map(function(p){
    return '<option value="' + p[0] + '"' + (reviewSort === p[0] ? ' selected' : '') + '>Sort: ' + esc(p[1]) + '</option>';
  }).join('');

  const html =
    '<div class="reviews-head">' +
      '<a href="#" class="back-link" onclick="backToTrainers(event)">&larr; Back to Trainers</a>' +
      '<div class="reviews-actions">' +
        '<select class="sort-select" onchange="setReviewSort(this.value)">' + sortOpts + '</select>' +
        '<button class="btn btn-primary" onclick="openReviewModal()">+ Submit Review</button>' +
      '</div>' +
    '</div>' +
    '<h2 class="reviews-title">Reviews &amp; Feedback</h2>' +
    '<div class="reviews-sub">All trainers' +
      (list.length ? '<span class="reviews-overall">&#9733; ' + overall.toFixed(1) + '/5 &nbsp;(' + list.length + ' review' + (list.length!==1?'s':'') + ')</span>' : '') +
    '</div>' +
    '<div class="review-cards">' +
      (list.length ? list.map(reviewCard).join('') : '<div class="empty">No reviews yet.</div>') +
    '</div>';

  document.getElementById('reviewsView').innerHTML = html;
  window.scrollTo(0, 0);
}

/* ---- Submit Review modal ---- */
function openReviewModal(){
  const trainerOpts = members.map(function(m){ return '<option value="' + m.id + '">' + esc(m.name) + '</option>'; }).join('');
  const params = REVIEW_PARAMS.map(function(p){
    return '<div class="param-input">' +
        '<span class="lbl">' + esc(p[1]) + '</span>' +
        '<input type="range" id="rv_' + p[0] + '" min="1" max="5" step="0.5" value="4" ' +
               'oninput="document.getElementById(\'rvn_' + p[0] + '\').textContent=this.value">' +
        '<span class="num" id="rvn_' + p[0] + '">4</span>' +
      '</div>';
  }).join('');
  const html =
    '<div class="rv-modal">' +
      '<h3>Submit a Review</h3>' +
      '<div class="add-grid">' +
        '<div><label>Trainer</label><select id="rv_trainer">' + trainerOpts + '</select></div>' +
        '<div><label>Your Name</label><input type="text" id="rv_name" placeholder="Trainee name"></div>' +
        '<div><label>Batch Number</label><input type="text" id="rv_batch" placeholder="e.g. B-2025-04"></div>' +
      '</div>' +
      '<div style="margin-top:14px"><label>Ratings (1–5)</label>' + params + '</div>' +
      '<div style="margin-top:6px"><label>Comment</label><textarea id="rv_comment" placeholder="Share your experience…"></textarea></div>' +
      '<div class="rv-modal-actions">' +
        '<button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>' +
        '<button class="btn btn-primary" onclick="submitReview()">Submit Review</button>' +
      '</div>' +
    '</div>';
  const ov = document.getElementById('rvModal');
  ov.innerHTML = html;
  ov.style.display = 'flex';
}
function closeReviewModal(){ const ov = document.getElementById('rvModal'); ov.style.display = 'none'; ov.innerHTML = ''; }

function submitReview(){
  const name = document.getElementById('rv_name').value.trim();
  if (!name) { alert('Please enter your name.'); return; }
  const sel = document.getElementById('rv_trainer');
  const trainerId = sel ? sel.value : '';
  const trainer = members.find(function(m){ return m.id === trainerId; });
  const scores = {};
  REVIEW_PARAMS.forEach(function(p){ scores[p[0]] = +document.getElementById('rv_' + p[0]).value || 0; });
  userReviews.push({
    id: 'r_' + Date.now().toString(36),
    trainerId: trainerId,
    trainerName: trainer ? trainer.name : '',
    name: name,
    batch: document.getElementById('rv_batch').value.trim(),
    comment: document.getElementById('rv_comment').value.trim(),
    scores: scores
  });
  saveReviews();
  closeReviewModal();
  showAllReviews();
}

/* ---- Router: switch between the trainers list and the reviews view ---- */
function route(){
  const isReviews = location.hash.indexOf('#reviews') === 0;
  const mainView = document.getElementById('mainView');
  const reviewsView = document.getElementById('reviewsView');
  if (isReviews) {
    mainView.style.display = 'none';
    reviewsView.style.display = '';
    showAllReviews();
  } else {
    reviewsView.style.display = 'none';
    mainView.style.display = '';
    closeReviewModal();
    render();
  }
}

/* ---- Day / night theme ---- */
const THEME_KEY = 'teamProfiles.theme';
function applyTheme(t){
  document.body.classList.toggle('dark', t === 'dark');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme(){
  const t = document.body.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, t);
  applyTheme(t);
}

applyTheme(localStorage.getItem(THEME_KEY) || 'light');
loadMembers();
window.addEventListener('hashchange', route);
</script>
