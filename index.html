<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Profiles</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1f2933;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #1d4ed8;
    --accent-soft: #eef2ff;
    --star: #f59e0b;
    --hover: #fafafa;
    --input: #ffffff;
    --ghost-bg: #ece9e2;
    --ghost-hover: #e0ddd4;
    --primary-bg: #1f2933;
    --primary-hover: #000000;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  }
  body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --ink: #e2e8f0;
    --muted: #94a3b8;
    --line: #334155;
    --accent: #60a5fa;
    --accent-soft: #1e3a5f;
    --star: #fbbf24;
    --hover: #243044;
    --input: #0f172a;
    --ghost-bg: #334155;
    --ghost-hover: #3f4d63;
    --primary-bg: #2563eb;
    --primary-hover: #1d4ed8;
    --shadow: 0 1px 3px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 80px; }

  header.page {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    justify-content: space-between; margin-bottom: 24px;
  }
  header.page h1 { font-size: 1.6rem; margin: 0; }
  header.page .sub { color: var(--muted); font-size: .9rem; margin-top: 2px; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 20px;
  }
  .search {
    flex: 1 1 260px; position: relative;
  }
  .search input {
    width: 100%; padding: 12px 14px 12px 40px; border: 1px solid var(--line);
    border-radius: 12px; font-size: .95rem; background: var(--input); color: var(--ink); outline: none;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .count-pill {
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
    padding: 8px 14px; border-radius: 999px; font-size: .85rem; white-space: nowrap;
  }
  .sort-select {
    padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--input); font-size: .9rem; color: var(--ink);
  }
  button.btn {
    border: none; cursor: pointer; font-size: .92rem; font-weight: 600;
    padding: 12px 18px; border-radius: 12px; transition: .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--primary-bg); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-ghost { background: var(--ghost-bg); color: var(--ink); }
  .btn-ghost:hover { background: var(--ghost-hover); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { filter: brightness(.92); }

  /* Header action buttons (theme + settings) */
  .head-actions { display: flex; align-items: center; gap: 10px; }
  .icon-toggle {
    width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; font-size: 1.05rem; display: grid; place-items: center;
    transition: .15s;
  }
  .icon-toggle:hover { background: var(--hover); }
  .settings-wrap { position: relative; }
  .settings-panel {
    position: absolute; right: 0; top: 50px; z-index: 40; display: none;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); padding: 12px; min-width: 230px;
  }
  .settings-panel.show { display: block; }
  .settings-panel .title { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  .settings-panel label {
    display: flex; align-items: center; gap: 9px; padding: 8px 4px; font-size: .9rem; cursor: pointer;
  }
  .settings-panel input { width: 16px; height: 16px; accent-color: var(--accent); }

  /* Accordion list */
  .list { display: flex; flex-direction: column; gap: 14px; }
  .acc {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; transition: border-color .15s;
  }
  .acc.open { border-color: var(--accent); }

  .acc-head {
    display: flex; align-items: center; gap: 16px; padding: 14px 16px; cursor: pointer;
    position: relative;
  }
  .acc-head:hover { background: var(--hover); }
  .avatar {
    width: 64px; height: 64px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, #dbeafe, #e0e7ff); overflow: hidden;
    position: relative; cursor: pointer;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar .avatar-initials {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--accent); font-size: 1.2rem; line-height: 1;
  }
  .avatar .avatar-edit {
    position: absolute; inset: 0; display: grid; place-items: center; font-size: 1.1rem;
    background: rgba(0,0,0,.45); color: #fff; opacity: 0; transition: opacity .15s; border-radius: 14px;
  }
  .avatar:hover .avatar-edit { opacity: 1; }
  .head-meta { flex: 1; min-width: 0; }
  .head-meta .name { font-size: 1.12rem; font-weight: 800; color: var(--accent); }
  .head-meta .role { color: var(--ink); font-size: .92rem; }
  .head-meta .company {
    display: inline-block; margin-top: 3px; color: var(--muted); font-size: .72rem;
    font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    background: var(--accent-soft); padding: 2px 8px; border-radius: 6px;
  }
  /* QR shown on the accordion header */
  .head-qr { flex-shrink: 0; text-align: center; }
  .head-qr .qr { background:#fff; padding:4px; border:1px solid var(--line); border-radius:8px; display:inline-block; line-height:0; }
  .head-qr .qr-label { font-size:.6rem; color:var(--muted); margin-top:1px; line-height:1.1; }
  .chevron { flex-shrink: 0; color: var(--muted); transition: transform .2s; }
  .acc.open .chevron { transform: rotate(180deg); }
  .del-btn {
    background: none; border: none; cursor: pointer; color: #cbd0d6; font-size: 1.1rem;
    padding: 4px 8px; border-radius: 8px; flex-shrink: 0;
  }
  .del-btn:hover { color: #dc2626; background: #fee2e2; }

  /* Body */
  .acc-body { display: none; padding: 4px 16px 20px; border-top: 1px solid var(--line); }
  .acc.open .acc-body { display: block; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 16px; align-items: stretch; }
  .col { display: flex; flex-direction: column; }
  .col h4 {
    margin: 0 0 8px; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted);
  }
  .field { margin-bottom: 16px; }
  .bio { font-size: .94rem; }
  .rating-row { display: flex; align-items: center; gap: 8px; font-size: .94rem; }
  .rating-big { font-size: .94rem; font-weight: 800; color: var(--ink); }
  .stars { color: var(--star); letter-spacing: 2px; font-size: .94rem; }
  .stat { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: .92rem; }
  .stat .v { font-weight: 700; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 10px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
  .chip.cert { background: rgba(16,185,129,.15); color: #10b981; }
  a.link { color: var(--accent); text-decoration: none; font-weight: 600; word-break: break-all; }
  a.link:hover { text-decoration: underline; }

  .cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: auto; padding-top: 18px; align-items: center; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--input); display: grid; place-items: center; cursor: pointer; color: var(--ink);
    text-decoration: none; transition: .15s;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .icon-btn.linkedin:hover { color: #0a66c2; border-color: #0a66c2; }
  .icon-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
  .icon-btn svg { width: 20px; height: 20px; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none;
    align-items: flex-start; justify-content: center; padding: 24px; z-index: 50; overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border-radius: 18px; width: 100%; max-width: 540px;
    padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.3); margin: auto;
  }
  .modal h2 { margin: 0 0 18px; }
  .modal label { display: block; font-size: .85rem; font-weight: 600; margin: 14px 0 5px; }
  .modal label .req { color: #dc2626; }
  .modal input[type=text], .modal input[type=email], .modal input[type=url], .modal textarea {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: .92rem; font-family: inherit; outline: none; background: var(--input); color: var(--ink);
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .modal textarea { resize: vertical; min-height: 70px; }
  .hint { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .modal-actions .btn { flex: 1; padding: 14px; }
  .avatar-row { display: flex; align-items: center; gap: 14px; }
  .avatar-preview {
    width: 56px; height: 56px; border-radius: 14px; background: var(--accent-soft);
    display: grid; place-items: center; overflow: hidden; flex-shrink: 0; color: var(--accent);
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

  /* Responsive */
  @media (max-width: 640px) {
    .cols { grid-template-columns: 1fr; gap: 16px; }
    .avatar { width: 52px; height: 52px; }
    .head-meta .name { font-size: 1rem; }
    header.page h1 { font-size: 1.3rem; }
    .acc-head { gap: 10px; }
    .head-qr .qr-label { display: none; }   /* save space on small screens */
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>Team Profiles</h1>
    <div class="head-actions">
      <button class="icon-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle day / night theme">🌙</button>
      <div class="settings-wrap">
        <button class="icon-toggle" onclick="toggleSettings(event)" title="Settings">⚙️</button>
        <div class="settings-panel" id="settingsPanel" onclick="event.stopPropagation()">
          <div class="title">Configuration</div>
          <label><input type="checkbox" id="cfgAdd" onchange="updateSettings()" /> Show “Add Member” button</label>
          <label><input type="checkbox" id="cfgDel" onchange="updateSettings()" /> Enable delete</label>
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="openModal()">+ Add Member</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search by name, role, company, or skill…" oninput="render()" />
    </div>
    <select id="sort" class="sort-select" onchange="render()">
      <option value="rating">Sort: Rating (high → low)</option>
      <option value="name">Sort: Name (A → Z)</option>
      <option value="experience">Sort: Experience</option>
    </select>
    <span class="count-pill" id="count">0 members</span>
  </div>

  <div class="list" id="list"></div>
</div>

<!-- Hidden input used to edit an existing member's photo -->
<input type="file" id="editAvatarInput" accept="image/*" style="display:none" />

<!-- Add Member Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Add Team Member</h2>
    <label>Avatar Image</label>
    <div class="avatar-row">
      <div class="avatar-preview" id="avatarPreview">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
      </div>
      <div>
        <button class="btn btn-ghost" type="button" onclick="document.getElementById('avatarInput').click()">Choose image</button>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="previewAvatar(event)" />
        <div class="hint">Optional — if empty, initials are shown.</div>
      </div>
    </div>

    <label>Full Name <span class="req">*</span></label>
    <input type="text" id="f_name" placeholder="Jane Doe" />

    <label>Role / Title <span class="req">*</span></label>
    <input type="text" id="f_role" placeholder="Senior Engineer" />

    <label>Company</label>
    <input type="text" id="f_company" placeholder="Acme Corp" />

    <label>Experience (years)</label>
    <input type="text" id="f_exp" placeholder="12" />

    <label>Skills</label>
    <input type="text" id="f_skills" placeholder="Python, Leadership, SQL" />
    <div class="hint">Separate skills with commas.</div>

    <label>Certifications</label>
    <input type="text" id="f_certs" placeholder="CSA, CAD, CIS-ITSM, PMP" />
    <div class="hint">Separate certifications with commas.</div>

    <label>📊 Trainings Delivered</label>
    <input type="text" id="f_trainings" placeholder="400" />

    <label>🚀 Successful Implementations</label>
    <input type="text" id="f_impl" placeholder="35" />

    <label>LinkedIn URL</label>
    <input type="url" id="f_linkedin" placeholder="https://www.linkedin.com/in/username" />
    <div class="hint">Optional — if empty, the Connect button searches LinkedIn by name.</div>

    <label>Email</label>
    <input type="email" id="f_email" placeholder="jane@company.com" />

    <label>Resume / CV URL</label>
    <input type="url" id="f_resume" placeholder="https://… link to PDF/Doc" />
    <div class="hint">Optional — downloadable from the member's card.</div>

    <label>Bio</label>
    <textarea id="f_bio" placeholder="A short paragraph — shown in the expanded profile."></textarea>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save Member</button>
    </div>
  </div>
</div>

<script>
const STORE = 'teamProfiles.v2';
let avatarData = '';

/* ---- 40 dummy team members (deterministic, varied so ratings differ) ---- */
function buildSeed(){
  const first = ['Alex','Priya','Marcus','Sara','James','Lena','Omar','Nina','David','Aisha',
    'Tom','Mei','Carlos','Ruth','Ivan','Grace','Hassan','Emma','Noah','Zara',
    'Leo','Maya','Sam','Tara','Kyle','Anya','Raj','Lucy','Ben','Chloe',
    'Victor','Hana','Felix','Iris','Dane','Nora','Eli','Yara','Paul','Mira'];
  const last = ['Rivera','Nair','Lee','Khan','Brooks','Vogel','Haddad','Patel','Stone','Bello',
    'Chen','Lin','Ortiz','Hayes','Petrov','Owens','Ali','Watts','Park','Reed',
    'Fox','Singh','Cole','Diaz','Burns','Volkov','Mehta','Hart','Frost','Wells',
    'Marsh','Sato','Berg','Quinn','Lowe','Reyes','Webb','Aziz','Dunn','Kerr'];
  const roles = ['Engineering Manager','Principal Data Scientist','UX Designer','Solutions Architect',
    'Product Manager','DevOps Lead','Frontend Engineer','Backend Engineer','QA Lead','Scrum Master',
    'Business Analyst','Security Engineer','ML Engineer','Cloud Architect','Tech Lead'];
  const companies = ['Acme Corp','DataWorks','Bright Studio','NorthBay','Vertex Labs','Cloudpeak',
    'BlueRiver','Helix','Quantum IO','Summit Tech'];
  const skillsPool = ['Python','Go','Java','SQL','AWS','Azure','Kubernetes','React','Leadership',
    'Mentoring','ML','TensorFlow','Figma','Docker','Terraform','Node.js','Statistics','Agile',
    'Security','Communication','Data Viz','GraphQL'];
  const certsPool = ['CSA','CAD','CIS-ITSM','PMP','AWS-SA','CKA','CISSP','Scrum-PSM','Azure-AZ900','TOGAF'];
  const bios = [
    'Leads backend infrastructure and mentors junior devs. Passionate about scalable systems.',
    'Builds production ML pipelines and trains analytics teams across the org.',
    'Human-centered designer focused on accessible, delightful product experiences.',
    'Drives platform reliability and champions a strong engineering culture.',
    'Connects business goals to technical delivery with a pragmatic, data-driven style.',
    'Hands-on technologist who loves automating the boring parts and shipping fast.',
    'Coaches teams toward continuous improvement and sustainable delivery.',
    'Specializes in secure-by-default architectures and threat modeling.'
  ];
  const out = [];
  for (let i = 0; i < 40; i++) {
    const name = first[i] + ' ' + last[i];
    const nSkills = 2 + (i % 6);          // 2..7 skills
    const nCerts = i % 5;                  // 0..4 certs
    const skills = []; for (let s=0;s<nSkills;s++) skills.push(skillsPool[(i*3+s)%skillsPool.length]);
    const certs  = []; for (let c=0;c<nCerts;c++)  certs.push(certsPool[(i*2+c)%certsPool.length]);
    const company = companies[i % companies.length];
    out.push({
      name,
      role: roles[i % roles.length],
      company,
      exp: 2 + (i % 18),                                   // 2..19 yrs
      skills: [...new Set(skills)],
      certs: [...new Set(certs)],
      trainings: (i * 17) % 460,                            // 0..459
      impl: (i * 7) % 45,                                   // 0..44
      linkedin: '',
      email: (first[i] + '.' + last[i]).toLowerCase() + '@' + company.toLowerCase().replace(/[^a-z]/g,'') + '.com',
      resume: '',
      bio: bios[i % bios.length]
    });
  }
  return out;
}
const seed = buildSeed();

function load() {
  const raw = localStorage.getItem(STORE);
  let data;
  if (raw) { try { data = JSON.parse(raw); } catch(e){} }
  if (!data) data = seed;
  // Repair any missing or duplicate IDs (older versions could collide)
  const seen = new Set();
  data.forEach(m => {
    if (!m.id || seen.has(m.id)) { m.id = null; withId(m); }
    seen.add(m.id);
  });
  return data;
}
let _idCounter = 0;
function withId(m){ if(!m.id) m.id = 'm_' + Date.now().toString(36) + '_' + (_idCounter++); return m; }
let members = load();
function save(){ localStorage.setItem(STORE, JSON.stringify(members)); }

/* ---- Rating engine ----
   Weighted score normalized to 0–5 from five dimensions. */
function computeRating(m){
  const exp = Math.min((+m.exp||0)/15, 1);          // 15+ yrs => max
  const certs = Math.min((m.certs?.length||0)/5, 1);// 5+ certs => max
  const trn = Math.min((+m.trainings||0)/300, 1);   // 300+ => max
  const impl = Math.min((+m.impl||0)/30, 1);         // 30+ => max
  const skl = Math.min((m.skills?.length||0)/6, 1); // 6+ skills => max
  const score = exp*0.30 + certs*0.20 + trn*0.20 + impl*0.20 + skl*0.10;
  return Math.round(score * 5 * 10) / 10;            // one decimal, 0–5
}
function stars(r){
  const full = Math.round(r);
  return '★'.repeat(full) + '☆'.repeat(5-full);
}
function initials(name){ return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sortBy = document.getElementById('sort').value;
  let rows = members.map(m => ({...m, _rating: computeRating(m)}));

  if (q) {
    rows = rows.filter(m => {
      const hay = [m.name, m.role, m.company, m.bio, (m.skills||[]).join(' '), (m.certs||[]).join(' ')]
        .join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  rows.sort((a,b)=>{
    if (sortBy==='name') return a.name.localeCompare(b.name);
    if (sortBy==='experience') return (+b.exp||0)-(+a.exp||0);
    return b._rating - a._rating;
  });

  document.getElementById('count').textContent = members.length + ' member' + (members.length!==1?'s':'');
  const list = document.getElementById('list');

  if (!rows.length) {
    list.innerHTML = '<div class="empty">No matching team members.</div>';
    return;
  }

  list.innerHTML = rows.map(m => {
    const profileUrl = location.href.split('#')[0] + '#profile=' + encodeURIComponent(m.id);
    const linkedin = m.linkedin || ('https://www.linkedin.com/search/results/all/?keywords=' + encodeURIComponent(m.name));
    const avatar = m.avatar
      ? `<img src="${m.avatar}" alt="${esc(m.name)}">`
      : `<span class="avatar-initials">${initials(m.name)}</span>`;
    const skillChips = (m.skills||[]).map(s=>`<span class="chip">${esc(s)}</span>`).join('') || '<span class="hint">—</span>';
    const certChips = (m.certs||[]).map(s=>`<span class="chip cert">${esc(s)}</span>`).join('') || '<span class="hint">—</span>';

    return `
    <div class="acc" id="acc-${m.id}">
      <div class="acc-head" onclick="toggle('${m.id}')">
        <div class="avatar" onclick="event.stopPropagation();editAvatar('${m.id}')" title="Click to upload / change photo">
          ${avatar}<span class="avatar-edit">📷</span>
        </div>
        <div class="head-meta">
          <div class="name">${esc(m.name)}</div>
          <div class="role">${esc(m.role)}</div>
          ${m.company ? `<span class="company">${esc(m.company)}</span>` : ''}
        </div>
        <div class="head-qr" onclick="event.stopPropagation()" title="Scan for complete profile">
          <div class="qr" id="qr-${m.id}"></div>
          <div class="qr-label">Complete profile</div>
        </div>
        ${settings.allowDelete ? `<button class="del-btn" title="Remove" onclick="event.stopPropagation();removeMember('${m.id}')">🗑</button>` : ''}
        <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="acc-body">
        <div class="cols">
          <div class="col">
            <div class="field">
              <div class="bio">${esc(m.bio) || '<span class="hint">No bio provided.</span>'}</div>
            </div>
            <div class="field">
              <div class="rating-row">
                <span class="rating-big">${m._rating.toFixed(1)}/5</span>
                <span class="stars">${stars(m._rating)}</span>
              </div>
            </div>
            <div class="cta-row">
              <a class="icon-btn linkedin" href="${esc(linkedin)}" target="_blank" rel="noopener" title="Connect on LinkedIn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V23h-4V8zm7.5 0h3.8v2.05h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V23h-4v-6.6c0-1.57-.03-3.6-2.2-3.6-2.2 0-2.53 1.72-2.53 3.49V23h-4V8z"/></svg>
              </a>
              <a class="icon-btn" href="mailto:${esc(m.email||'')}" title="Contact ${esc(m.name)}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
              </a>
              <a class="icon-btn ${m.resume ? '' : 'disabled'}" href="${esc(m.resume||'#')}" target="_blank" download title="${m.resume ? 'Download resume' : 'No resume available'}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
              </a>
            </div>
          </div>
          <div class="col">
            <div class="field">
              <div class="stat"><span>💼 Experience</span><span class="v">${esc(String(m.exp||0))} yrs</span></div>
              <div class="stat"><span>📊 Trainings Delivered</span><span class="v">${esc(String(m.trainings||0))}</span></div>
              <div class="stat"><span>🚀 Successful Implementations</span><span class="v">${esc(String(m.impl||0))}</span></div>
            </div>
            <div class="field">
              <h4>🎖 Certifications (${(m.certs||[]).length})</h4>
              <div class="chips">${certChips}</div>
            </div>
            <div class="field">
              <h4>🛠 Skills</h4>
              <div class="chips">${skillChips}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // (Re)generate QR codes for currently rendered members
  rows.forEach(m => {
    const el = document.getElementById('qr-'+m.id);
    if (el) {
      const profileUrl = location.href.split('#')[0] + '#profile=' + encodeURIComponent(m.id);
      new QRCode(el, { text: profileUrl, width: 48, height: 48, correctLevel: QRCode.CorrectLevel.M });
    }
  });

  // keep open state if hash points at a profile
  const hash = decodeURIComponent((location.hash.match(/profile=([^&]+)/)||[])[1]||'');
  if (hash) toggle(hash, true);
}

function toggle(id, forceOpen){
  const el = document.getElementById('acc-'+id);
  if (!el) return;
  const willOpen = forceOpen ? true : !el.classList.contains('open');
  // Collapse any other open profile — only one stays open at a time
  document.querySelectorAll('.acc.open').forEach(a => a.classList.remove('open'));
  if (willOpen) el.classList.add('open');
}

function removeMember(id){
  const m = members.find(x=>x.id===id);
  if (!m) return;
  if (confirm('Remove ' + m.name + ' from the team?')) {
    members = members.filter(x=>x.id!==id);
    save(); render();
  }
}

/* ---- Edit an existing member's photo ---- */
function editAvatar(id){
  const input = document.getElementById('editAvatarInput');
  input.value = '';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const m = members.find(x=>x.id===id);
      if (!m) return;
      m.avatar = ev.target.result;
      save();
      render();
      toggle(id, true); // keep the card expanded after update
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

/* ---- Modal ---- */
function openModal(){
  avatarData = '';
  ['f_name','f_role','f_company','f_exp','f_skills','f_certs','f_trainings','f_impl','f_linkedin','f_email','f_resume','f_bio']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('avatarPreview').innerHTML =
    '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function previewAvatar(e){
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    avatarData = ev.target.result;
    document.getElementById('avatarPreview').innerHTML = '<img src="'+avatarData+'">';
  };
  reader.readAsDataURL(file);
}

function splitList(v){ return v.split(',').map(s=>s.trim()).filter(Boolean); }

function saveMember(){
  const name = document.getElementById('f_name').value.trim();
  const role = document.getElementById('f_role').value.trim();
  if (!name || !role) { alert('Name and Role are required.'); return; }

  const m = withId({
    name, role,
    company: document.getElementById('f_company').value.trim(),
    exp: +document.getElementById('f_exp').value || 0,
    skills: splitList(document.getElementById('f_skills').value),
    certs: splitList(document.getElementById('f_certs').value),
    trainings: +document.getElementById('f_trainings').value || 0,
    impl: +document.getElementById('f_impl').value || 0,
    linkedin: document.getElementById('f_linkedin').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    resume: document.getElementById('f_resume').value.trim(),
    bio: document.getElementById('f_bio').value.trim(),
    avatar: avatarData
  });
  members.push(m);
  save(); closeModal(); render();
}

/* ---- Day / night theme ---- */
const THEME_KEY = 'teamProfiles.theme';
function applyTheme(t){
  document.body.classList.toggle('dark', t === 'dark');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme(){
  const t = document.body.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, t);
  applyTheme(t);
}

/* ---- Configuration: show/hide Add + Delete ---- */
const SETTINGS_KEY = 'teamProfiles.settings';
let settings = { showAdd: true, allowDelete: true };
try { Object.assign(settings, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')); } catch(e){}

function applySettings(){
  document.getElementById('addBtn').style.display = settings.showAdd ? '' : 'none';
  document.getElementById('cfgAdd').checked = settings.showAdd;
  document.getElementById('cfgDel').checked = settings.allowDelete;
}
function updateSettings(){
  settings.showAdd = document.getElementById('cfgAdd').checked;
  settings.allowDelete = document.getElementById('cfgDel').checked;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  applySettings();
  render();
}
function toggleSettings(e){
  e.stopPropagation();
  document.getElementById('settingsPanel').classList.toggle('show');
}
// click outside closes the settings panel
document.addEventListener('click', () => document.getElementById('settingsPanel').classList.remove('show'));

applyTheme(localStorage.getItem(THEME_KEY) || 'light');
applySettings();
render();
window.addEventListener('hashchange', render);
</script>
</body>
</html>
